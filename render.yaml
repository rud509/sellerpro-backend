services:
  - type: web
    name: sellerpro-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AMAZON_CLIENT_ID
        sync: false
      - key: AMAZON_CLIENT_SECRET
        sync: false
      - key: AMAZON_REFRESH_TOKEN
        sync: false
      - key: AMAZON_MARKETPLACE_ID
        value: ATVPDKIKX0DER
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
